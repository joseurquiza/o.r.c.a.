<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
    }
    
    h1 {
      margin: 0;
      font-size: 18px;
      color: #1f2937;
    }
    
    .subtitle {
      color: #6b7280;
      font-size: 12px;
      margin: 5px 0 0 0;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #374151;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    
    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    button {
      width: 100%;
      padding: 10px;
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    button:hover:not(:disabled) {
      background-color: #2563eb;
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }
    
    .status.connected {
      background-color: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    
    .status.error {
      background-color: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
    
    .status.connecting {
      background-color: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }
    
    .current-agent {
      margin-top: 10px;
      padding: 8px 12px;
      background-color: #f3f4f6;
      border-radius: 6px;
      font-size: 12px;
      color: #374151;
      font-family: monospace;
    }
    
    .instructions {
      margin-top: 15px;
      padding: 12px;
      background-color: #f8fafc;
      border-radius: 6px;
      border-left: 3px solid #3b82f6;
    }
    
    .instructions h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
      color: #1f2937;
    }
    
    .instructions ol {
      margin: 0;
      padding-left: 16px;
      font-size: 12px;
      color: #4b5563;
      line-height: 1.4;
    }
    
    .instructions li {
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🐋</div>
    <h1>ORCA Extension</h1>
    <p class="subtitle">Remote Browser Control</p>
  </div>
  
  <div class="form-group">
    <label for="agentId">Agent ID</label>
    <input type="text" id="agentId" placeholder="Enter your Agent ID (e.g., remote_123...)" />
  </div>
  
  <button id="connectBtn">Connect to ORCA</button>
  
  <div id="status" class="status" style="display: none;"></div>
  <div id="currentAgent" class="current-agent" style="display: none;"></div>
  
  <div class="instructions">
    <h3>Setup Instructions:</h3>
    <ol>
      <li>Get your Agent ID from the ORCA admin panel</li>
      <li>Enter the Agent ID above</li>
      <li>Click "Connect to ORCA"</li>
      <li>Your browser is now remotely controllable</li>
    </ol>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
