<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORCA Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 12px;
      color: #71717a;
    }

    .status-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .status-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #71717a;
    }

    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }

    .status-dot.connecting {
      background: #eab308;
      animation: pulse 1s infinite;
    }

    .status-dot.error {
      background: #ef4444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 14px;
      font-weight: 500;
    }

    .status-detail {
      font-size: 12px;
      color: #71717a;
      margin-top: 4px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 6px;
    }

    .input {
      width: 100%;
      padding: 10px 12px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: #fafafa;
      font-size: 13px;
      font-family: 'SF Mono', Monaco, monospace;
      transition: border-color 0.2s;
    }

    .input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .input::placeholder {
      color: #52525b;
    }

    .button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .button-primary {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
    }

    .button-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .button-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .button-secondary {
      background: #27272a;
      color: #fafafa;
    }

    .button-secondary:hover {
      background: #3f3f46;
    }

    .button-danger {
      background: #7f1d1d;
      color: #fafafa;
    }

    .button-danger:hover {
      background: #991b1b;
    }

    .agent-info {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .info-label {
      color: #71717a;
    }

    .info-value {
      color: #fafafa;
      font-family: 'SF Mono', Monaco, monospace;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .help-text {
      font-size: 11px;
      color: #52525b;
      text-align: center;
      margin-top: 16px;
    }

    .help-text a {
      color: #3b82f6;
      text-decoration: none;
    }

    .error-message {
      background: #7f1d1d;
      border: 1px solid #991b1b;
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      margin-bottom: 16px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🐋</div>
      <div>
        <div class="title">ORCA Agent</div>
        <div class="subtitle">Remote Browser Control</div>
      </div>
    </div>

    <div class="status-card">
      <div class="status-header">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Disconnected</span>
      </div>
      <div class="status-detail" id="statusDetail">Enter an Agent ID to connect</div>
    </div>

    <div id="errorMessage" class="error-message hidden"></div>

    <div id="connectForm">
      <div class="input-group">
        <label class="input-label">Agent ID</label>
        <input 
          type="text" 
          class="input" 
          id="agentIdInput" 
          placeholder="remote_1234567890_abc123def"
          autocomplete="off"
        >
      </div>
      <button class="button button-primary" id="connectBtn">
        Connect to ORCA
      </button>
    </div>

    <div id="connectedView" class="hidden">
      <div class="agent-info">
        <div class="info-row">
          <span class="info-label">Agent ID</span>
          <span class="info-value" id="connectedAgentId">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Last Heartbeat</span>
          <span class="info-value" id="lastHeartbeat">-</span>
        </div>
      </div>
      <button class="button button-danger" id="disconnectBtn">
        Disconnect
      </button>
    </div>

    <p class="help-text">
      Get your Agent ID from the <a href="https://orca-git-main-jordans-projects-d18a4973.vercel.app/agents/remote-v2" target="_blank">ORCA Dashboard</a>
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
